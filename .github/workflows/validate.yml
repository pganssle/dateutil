name: Validate

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  test:
    strategy:
      matrix:
        python-version: [
          "2.7",
          "3.5",
          "3.6",
          "3.7",
          "3.8",
          "3.9",
          "3.10",
          "3.11",
          "pypy-2.7",
          "pypy-3.8",
        ]
        os: [ubuntu-latest, windows-latest, macos-latest]
        exclude:
          - python-version: "2.7"
            os: "ubuntu-latest"
          - python-version: "3.5"
            os: "ubuntu-latest"
          - python-version: "3.6"
            os: "ubuntu-latest"
        include:
          - python-version: "2.7"
            os: "ubuntu-20.04"
          - python-version: "3.5"
            os: "ubuntu-20.04"
          - python-version: "3.6"
            os: "ubuntu-20.04"
    runs-on: ${{ matrix.os }}
    env:
      TOXENV: py
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python ${{ matrix.python-version }} on ${{ matrix.os }}
        uses: actions/setup-python@v3
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: python -m pip install -U tox
      - name: Install zic (Windows)
        run: |
          curl https://get.enterprisedb.com/postgresql/postgresql-9.5.21-2-windows-x64-binaries.zip --output $env:GITHUB_WORKSPACE\postgresql9.5.21.zip
          unzip -oq $env:GITHUB_WORKSPACE\postgresql9.5.21.zip -d .postgresql
        if: runner.os == 'Windows'
      - name: Run updatezinfo.py (Windows)
        run: |
          $env:Path += ";$env:GITHUB_WORKSPACE\.postgresql\pgsql\bin"
          ci_tools/retry.bat python updatezinfo.py
        if: runner.os == 'Windows'
      - name: Run updatezinfo.py (Unix)
        run: ./ci_tools/retry.sh python updatezinfo.py
        if: runner.os != 'Windows'
      - name: Run tox
        run: python -m tox
      - name: Generate coverage.xml
        run: python -m tox -e coverage
      - name: Upload coverage data
        uses: actions/upload-artifact@v3
        with:
          name: coverage-data
          path: ".coverage.*"
          if-no-files-found: ignore

  coverage:
      name: Combine & check coverage.
      if: always()
      needs: tests
      runs-on: ubuntu-latest

      steps:
        - uses: actions/checkout@v3
        - uses: actions/setup-python@v4
          with:
            # Use latest Python, so it understands all syntax.
            python-version: "3.11"

        - run: python -Im pip install --upgrade coverage[toml]

        - uses: actions/download-artifact@v3
          with:
            name: coverage-data

        - name: Combine coverage & fail if it's <80%
          run: |
            python -Im coverage combine
            python -Im coverage html --skip-covered --skip-empty

            # Report and write to summary.
            python -Im coverage report | sed 's/^/    /' >> $GITHUB_STEP_SUMMARY

            # Report again and fail if under 80%.
            python -Im coverage report --fail-under=80

        - name: Upload HTML report if check failed.
          uses: actions/upload-artifact@v3
          with:
            name: html-report
            path: htmlcov
          if: ${{ failure() }}

  other:
    runs-on: "ubuntu-latest"
    strategy:
      matrix:
        toxenv: ["docs", "tz", "precommit"]
    env:
      TOXENV: ${{ matrix.toxenv }}

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: ${{ matrix.toxenv }}
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - name: Install tox
        run: |
          python -m pip install --upgrade pip
          if [[ $TOXENV == "tz" ]]; then
            python -m pip install -U "tox<3.8.0"
          else
            python -m pip install -U tox
          fi
      - name: Run updatezinfo.py
        run: ./ci_tools/retry.sh python updatezinfo.py
        if: matrix.toxenv == 'tox'
      - name: Run action
        run: tox

  darker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v4
      - uses: akaihola/darker@1.5.1
        with:
          options: "--check --diff --color --isort"
          src: "."
          version: "1.5.1"

  build-dist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v3
        with:
          python-version: "3.10"
      - name: Install tox
        run: python -m pip install -U tox
      - name: Run tox
        run: python -m tox -e build
      - name: Check generation
        run: |
          exactly_one() {
            value=$(find dist -iname $1 | wc -l)
            if [ $value -ne 1 ]; then
              echo "Found $value instances of $1, not 1"
              return 1
            else
              echo "Found exactly 1 instance of $value"
            fi
          }
          # Check that exactly one tarball and one wheel are created
          exactly_one '*.tar.gz'
          exactly_one '*.whl'
